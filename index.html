<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CQ Builder Pro</title>

    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'none' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: Arial;
            background: #eef2ff;
        }

        .editor {
            width: 40%;
            padding: 15px;
            overflow: auto;
            background: white;
            border-right: 2px solid #ddd;
        }

        button {
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
        }

        /* CARD */
        .card {
            background: #f9fafb;
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
        }

        textarea {
            width: 95%;
            min-height: 60px;
            margin: 5px 0;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        /* ===== A4 DESIGN ===== */

        #pdfArea {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: auto;
            padding: 15mm;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px solid #000;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            margin-top: 20px;
            border-top: 1px solid #000;
            padding-top: 5px;
        }

        .qblock {
            margin-bottom: 18px;
        }

        .stimulus {
            background: #f3f4f6;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .sub {
            margin-left: 10px;
            margin-bottom: 5px;
        }

        /* 🔥 NEW */
        .subq {
            margin: 6px 0;
            padding: 6px;
            background: #f8fafc;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
        }

        .sub-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .del {
            cursor: pointer;
            color: red;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="editor">

        <h2>Creative Question Builder</h2>

        <button onclick="addQuestion()">+ Add Question</button>
        <button onclick="downloadPDF()">⬇ Download PDF</button>

        <div id="editorArea"></div>

    </div>

    <div style="width:60%;overflow:auto;padding:10px;">
        <div id="pdfArea"></div>
    </div>

    <script>

        let qCount = 0;

        /* 🔥 SUB BOX */
        function subBox(label, value = "") {
            return `
    <div class="subq">
      <div class="sub-header">
        <b>${label})</b>
        <span class="del" onclick="removeSub(this)">❌</span>
      </div>
      <textarea oninput="update()">${value}</textarea>
    </div>
  `;
        }

        /* 🔥 REMOVE SUB */
        function removeSub(el) {
            const box = el.closest(".subq");
            box.querySelector("textarea").value = "";
            box.style.display = "none";
            update();
        }

        /* ADD */
        function addQuestion(data = {}) {

            qCount++;

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
    <h4>Question ${qCount}</h4>

    <textarea placeholder="Stimulus" oninput="update()">${data.stimulus || ""}</textarea>

    <input type="file" accept="image/*" onchange="handleImage(this)">
    <input type="hidden" class="imgData" value="${data.img || ""}">

    ${subBox("ক", data.k)}
    ${subBox("খ", data.kh)}
    ${subBox("গ", data.ga)}
    ${subBox("ঘ", data.gha)}
  `;

            document.getElementById("editorArea").appendChild(div);

            update();
        }

        /* IMAGE */
        function handleImage(input) {
            const file = input.files[0];
            const reader = new FileReader();

            reader.onload = e => {
                input.parentElement.querySelector(".imgData").value = e.target.result;
                update();
            };

            if (file) reader.readAsDataURL(file);
        }

        /* FORMAT */
        function fmt(t) {
            if (!t) return "";
            return t.replace(/\n/g, "<br>");
        }

        /* UPDATE A4 PREVIEW */
        async function update() {

            const cards = document.querySelectorAll(".card");

            let html = `
    <div class="header">
      Creative Question
    </div>
  `;

            cards.forEach((c, i) => {

                const t = c.querySelectorAll("textarea");
                const img = c.querySelector(".imgData").value;

                const subs = c.querySelectorAll(".subq");

                function get(i) {
                    if (!subs[i]) return "";
                    if (subs[i].style.display === "none") return "";
                    return subs[i].querySelector("textarea").value;
                }

                html += `
      <div class="qblock">

        <b>Creative Question:- ${i + 1}</b>

        <div class="stimulus">
          ${fmt(t[0].value)}
          ${img ? `<img src="${img}" style="max-width:100%;margin-top:5px;">` : ""}
        </div>

        ${get(0) ? `<div class="sub">ক) ${fmt(get(0))}</div>` : ""}
        ${get(1) ? `<div class="sub">খ) ${fmt(get(1))}</div>` : ""}
        ${get(2) ? `<div class="sub">গ) ${fmt(get(2))}</div>` : ""}
        ${get(3) ? `<div class="sub">ঘ) ${fmt(get(3))}</div>` : ""}

      </div>
    `;
            });

            html += `
    <div class="footer">
      Generated by Shikhoni.
    </div>
  `;

            document.getElementById("pdfArea").innerHTML = html;

            await MathJax.typesetPromise();
        }

        /* PDF */
        async function downloadPDF() {

            const { jsPDF } = window.jspdf;

            await MathJax.typesetPromise();

            const element = document.getElementById("pdfArea");

            const canvas = await html2canvas(element, {
                scale: 2,
                useCORS: true
            });

            const imgData = canvas.toDataURL("image/png");

            const pdf = new jsPDF("p", "mm", "a4");

            const pageWidth = 210;
            const pageHeight = 297;

            const imgHeight = (canvas.height * pageWidth) / canvas.width;

            let heightLeft = imgHeight;
            let position = 0;

            pdf.addImage(imgData, "PNG", 0, position, pageWidth, imgHeight);

            heightLeft -= pageHeight;

            while (heightLeft > 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, "PNG", 0, position, pageWidth, imgHeight);
                heightLeft -= pageHeight;
            }

            pdf.save("Shikhoni CQ.pdf");
        }

        /* INIT */
        addQuestion();

    </script>

</body>

</html>
